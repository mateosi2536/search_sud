<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador SUD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Buscador SUD</h1>
            <p class="subtitle">Búsqueda Semántica</p>
        </header>

        <div class="search-bar">
            <input type="text" id="query" placeholder="Escribe una pregunta y presiona Enter..." disabled>
        </div>

        <div class="controls-bar">
            <div class="status-group">
                <div class="source-toggle">
                    <button class="source-btn active" data-source="scriptures">Escrituras</button>
                    <button class="source-btn" data-source="manual">Manual General</button>
                </div>
                <div class="status-item">
                    <div id="status-dot" class="dot"></div>
                    <span id="status-text">Cargando...</span>
                </div>
                <div class="status-item" id="llm-status" style="display:none">
                    <div id="llm-dot" class="dot dot-gray"></div>
                    <span id="llm-text">IA: no cargada</span>
                </div>
                <span id="stats" class="stats-text"></span>
            </div>
            <div class="controls-right" id="llm-controls" style="display:none">
                <div class="custom-select" id="model-select-wrapper">
                    <button class="custom-select-btn" id="model-select-btn">
                        <span id="model-select-label">Qwen 1.5B (~700 MB)</span>
                        <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    </button>
                    <div class="custom-select-dropdown" id="model-select-dropdown">
                        <button class="custom-select-opt" data-value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen 0.5B <span class="opt-size">~350 MB</span></button>
                        <button class="custom-select-opt active" data-value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen 1.5B <span class="opt-size">~700 MB</span></button>
                        <button class="custom-select-opt" data-value="Qwen2.5-3B-Instruct-q4f16_1-MLC">Qwen 3B <span class="opt-size">~1.5 GB</span></button>
                    </div>
                </div>
                <button id="llm-toggle" class="llm-btn">Cargar IA</button>
            </div>
        </div>

        <div class="main-grid" id="main-grid">
            <div class="results-col">
                <div id="user-results-section" style="display:none">
                    <div class="section-label">Tu búsqueda</div>
                    <div id="user-results"></div>
                </div>
                <div id="ai-results-section" style="display:none">
                    <div class="section-label label-ai">Búsqueda de la IA</div>
                    <div id="ai-query-preview" class="ai-query-preview"></div>
                    <div id="ai-results"></div>
                </div>
            </div>
            <div class="answer-col" id="answer-col" style="display:none">
                <div class="section-label label-ai">Respuesta IA</div>
                <div id="answer-text" class="answer-text"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';
        import * as webllm from 'https://esm.run/@mlc-ai/web-llm';

        const DIMS  = 768;
        const TOP_K = 8;
        const RAG_K = 3;

        // Estado por fuente
        const sources = {
            scriptures: { vectors: null, metadata: null, loaded: false, loading: false },
            manual:     { vectors: null, metadata: null, loaded: false, loading: false },
        };
        let currentSource = 'scriptures';

        let embedder = null;
        let llmEngine        = null;
        let llmEnginePromise = null;

        const queryInput         = document.getElementById('query');
        const statusText         = document.getElementById('status-text');
        const statusDot          = document.getElementById('status-dot');
        const statsDiv           = document.getElementById('stats');
        const llmStatusDiv       = document.getElementById('llm-status');
        const llmDot             = document.getElementById('llm-dot');
        const llmText            = document.getElementById('llm-text');
        const llmControls        = document.getElementById('llm-controls');
        const llmToggle          = document.getElementById('llm-toggle');
        const modelSelectBtn     = document.getElementById('model-select-btn');
        const modelSelectLabel   = document.getElementById('model-select-label');
        const modelDropdown      = document.getElementById('model-select-dropdown');
        const modelSelectWrapper = document.getElementById('model-select-wrapper');
        const userResultsDiv     = document.getElementById('user-results');
        const userSection        = document.getElementById('user-results-section');
        const aiResultsDiv       = document.getElementById('ai-results');
        const aiSection          = document.getElementById('ai-results-section');
        const aiQueryPreview     = document.getElementById('ai-query-preview');
        const answerCol          = document.getElementById('answer-col');
        const answerText         = document.getElementById('answer-text');

        // ── Source toggle ─────────────────────────────────────────────────────
        document.querySelectorAll('.source-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const src = btn.dataset.source;
                if (src === currentSource) return;
                currentSource = src;
                document.querySelectorAll('.source-btn').forEach(b => b.classList.toggle('active', b.dataset.source === src));

                // Limpiar resultados
                userSection.style.display = 'none';
                aiSection.style.display   = 'none';
                answerCol.style.display   = 'none';
                statsDiv.innerText        = '';

                if (!sources[src].loaded && !sources[src].loading) {
                    await loadSource(src);
                } else if (sources[src].loaded) {
                    const count = sources[src].metadata.length;
                    statusText.innerText = src === 'scriptures'
                        ? `${count.toLocaleString('es')} escrituras`
                        : `${count.toLocaleString('es')} fragmentos del Manual`;
                    statusDot.classList.add('ready');
                    queryInput.disabled = false;
                }
            });
        });

        // ── Custom model select ───────────────────────────────────────────────
        let selectedModelId = 'Qwen2.5-1.5B-Instruct-q4f16_1-MLC';
        let modelSelectDisabled = false;

        modelSelectBtn.addEventListener('click', () => {
            if (modelSelectDisabled) return;
            modelSelectWrapper.classList.toggle('open');
        });
        document.addEventListener('click', e => {
            if (!modelSelectWrapper.contains(e.target)) modelSelectWrapper.classList.remove('open');
        });
        modelDropdown.querySelectorAll('.custom-select-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                if (modelSelectDisabled) return;
                const newId = btn.dataset.value;
                if (newId === selectedModelId) { modelSelectWrapper.classList.remove('open'); return; }
                selectedModelId = newId;
                modelSelectLabel.textContent = btn.textContent.trim();
                modelDropdown.querySelectorAll('.custom-select-opt').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                modelSelectWrapper.classList.remove('open');
                if (llmEngine || llmEnginePromise) {
                    llmEngine = null; llmEnginePromise = null;
                    llmDot.className = 'dot dot-gray';
                    llmText.innerText = 'IA: no cargada';
                    llmToggle.innerText = 'Cargar IA';
                    llmToggle.disabled = false;
                }
            });
        });

        // ── Cargar fuente ─────────────────────────────────────────────────────
        async function loadSource(src) {
            sources[src].loading = true;
            statusDot.classList.remove('ready');
            queryInput.disabled = true;
            statusText.innerText = src === 'scriptures' ? 'Cargando escrituras...' : 'Cargando Manual General...';

            const vecFile  = src === 'scriptures' ? 'vectors.bin'        : 'manual_vectors.bin';
            const metaFile = src === 'scriptures' ? 'metadata.json'      : 'manual_metadata.json';

            try {
                const [vecRes, metaRes] = await Promise.all([fetch(vecFile), fetch(metaFile)]);
                const [vecBuf, metaData] = await Promise.all([vecRes.arrayBuffer(), metaRes.json()]);
                sources[src].vectors  = new Float32Array(vecBuf);
                sources[src].metadata = metaData;
                sources[src].loaded   = true;
                sources[src].loading  = false;

                // Solo actualizar UI si seguimos en esta fuente
                if (currentSource === src) {
                    const count = metaData.length;
                    statusText.innerText = src === 'scriptures'
                        ? `${count.toLocaleString('es')} escrituras`
                        : `${count.toLocaleString('es')} fragmentos del Manual`;
                    statusDot.classList.add('ready');
                    queryInput.disabled = false;
                    queryInput.focus();
                    llmStatusDiv.style.display = 'flex';
                    llmControls.style.display  = 'flex';
                }
            } catch (err) {
                console.error(err);
                statusText.innerText = 'Error al cargar.';
                statusDot.style.background = '#ef4444';
                sources[src].loading = false;
            }
        }

        async function init() {
            try {
                statusText.innerText = 'Cargando modelo...';
                embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-mpnet-base-v2');
                await loadSource('scriptures');
            } catch (err) {
                console.error(err);
                statusText.innerText = 'Error al cargar.';
                statusDot.style.background = '#ef4444';
            }
        }

        // ── Cargar LLM ────────────────────────────────────────────────────────
        function loadLLM() {
            if (llmEnginePromise) return llmEnginePromise;
            llmToggle.disabled  = true;
            modelSelectDisabled = true;
            modelSelectBtn.style.opacity = '0.5';
            llmDot.className    = 'dot dot-amber';
            llmText.innerText   = 'IA: descargando...';

            llmEnginePromise = webllm.CreateMLCEngine(selectedModelId, {
                initProgressCallback: p => { llmText.innerText = `IA: ${p.text}`; },
            }).then(engine => {
                llmEngine = engine;
                llmDot.className    = 'dot ready';
                llmText.innerText   = 'IA lista';
                llmToggle.innerText = 'IA activa';
                modelSelectDisabled = false;
                modelSelectBtn.style.opacity = '';
                return engine;
            }).catch(err => {
                console.error(err);
                llmText.innerText   = 'IA: error';
                llmDot.style.background = '#ef4444';
                llmToggle.disabled  = false;
                modelSelectDisabled = false;
                modelSelectBtn.style.opacity = '';
                llmToggle.innerText = 'Reintentar';
                llmEnginePromise    = null;
                throw err;
            });
            return llmEnginePromise;
        }
        llmToggle.addEventListener('click', loadLLM);

        // ── KNN ───────────────────────────────────────────────────────────────
        function knn(queryVec, k = TOP_K) {
            const { vectors, metadata } = sources[currentSource];
            const n = vectors.length / DIMS;
            const scores = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                let dot = 0, off = i * DIMS;
                for (let j = 0; j < DIMS; j++) dot += queryVec[j] * vectors[off + j];
                scores[i] = dot;
            }
            const indices = Array.from({ length: n }, (_, i) => i);
            indices.sort((a, b) => scores[b] - scores[a]);
            return indices.slice(0, k).map(i => ({ score: scores[i], ...metadata[i] }));
        }

        async function embed(text) {
            const out = await embedder(text, { pooling: 'mean', normalize: true });
            return new Float32Array(out.data);
        }

        // ── Búsqueda principal ────────────────────────────────────────────────
        async function search(query) {
            const src = sources[currentSource];
            if (!src.loaded || !embedder || !query.trim()) return;

            userSection.style.display = 'none';
            aiSection.style.display   = 'none';
            answerCol.style.display   = 'none';
            userResultsDiv.innerHTML  = skeletons(3);
            userSection.style.display = 'block';
            statsDiv.innerText        = '';

            const t0 = performance.now();
            const userVec     = await embed(query);
            const userResults = knn(userVec);
            const elapsed     = (performance.now() - t0).toFixed(0);

            statsDiv.innerText = `${elapsed} ms`;
            renderResults(userResultsDiv, userResults);

            if (llmEngine) runRAG(query);
        }

        // ── RAG ───────────────────────────────────────────────────────────────
        async function runRAG(query) {
            const isManual = currentSource === 'manual';

            aiQueryPreview.innerText = '...';
            aiResultsDiv.innerHTML   = skeletons(2);
            aiSection.style.display  = 'block';
            answerCol.style.display  = 'block';
            answerText.innerText     = '';
            answerText.classList.add('generating');

            const systemExpand = isManual
                ? 'Tu tarea es describir en una frase corta (máximo 12 palabras) el contenido que tendría una sección del Manual General de la Iglesia de Jesucristo de los SUD útil para responder la pregunta del usuario. Responde SOLO con la frase.'
                : 'Tu tarea es describir en una frase corta (máximo 12 palabras) el contenido o enseñanza que tendría un versículo de las escrituras útil para responder la pregunta del usuario. La frase debe sonar como una descripción de texto escritural. Responde SOLO con la frase.';

            let refinedQuery = query;
            try {
                const qStream = await llmEngine.chat.completions.create({
                    messages: [
                        { role: 'system', content: systemExpand },
                        { role: 'user',   content: query },
                    ],
                    stream: true, max_tokens: 40, temperature: 0.2,
                });
                let q = '';
                for await (const chunk of qStream) q += chunk.choices[0]?.delta?.content || '';
                refinedQuery = q.trim().replace(/^["']|["']$/g, '');
            } catch (err) { console.error('Error en expansión:', err); }

            aiQueryPreview.innerText = `"${refinedQuery}"`;

            const aiVec     = await embed(refinedQuery);
            const aiResults = knn(aiVec);
            renderResults(aiResultsDiv, aiResults);

            const context = aiResults.slice(0, RAG_K).map(r => {
                if (isManual) {
                    const ref = r.section_number
                        ? `${r.section_number} ${r.section_title}`
                        : r.chapter_title;
                    return `[${ref}]\n${r.text}`;
                } else {
                    const ref = `${r.book} ${r.chapter}:${r.verses[0]}-${r.verses[r.verses.length - 1]}`;
                    return `[${ref}]\n${r.text}`;
                }
            }).join('\n\n');

            const systemAnswer = isManual
                ? 'Eres un asistente experto en el Manual General de La Iglesia de Jesucristo de los Santos de los Últimos Días. Responde en español, de forma clara y concisa, citando las secciones del manual.'
                : 'Eres un asistente experto en las escrituras de La Iglesia de Jesucristo de los Santos de los Últimos Días. Responde en español, de forma clara y concisa, citando las referencias de las escrituras.';

            const userPrompt = isManual
                ? `Contexto del Manual General:\n\n${context}\n\nPregunta: ${query}\n\nResponde en español citando las secciones del manual.`
                : `Contexto de las escrituras:\n\n${context}\n\nPregunta: ${query}\n\nResponde en español citando las referencias.`;

            try {
                const aStream = await llmEngine.chat.completions.create({
                    messages: [
                        { role: 'system', content: systemAnswer },
                        { role: 'user',   content: userPrompt },
                    ],
                    stream: true, max_tokens: 400, temperature: 0.3,
                });
                let answer = '';
                answerText.innerText = '';
                for await (const chunk of aStream) {
                    answer += chunk.choices[0]?.delta?.content || '';
                    answerText.innerText = answer;
                }
            } catch (err) {
                console.error(err);
                answerText.innerText = 'Error al generar la respuesta.';
            } finally {
                answerText.classList.remove('generating');
            }
        }

        // ── Render ────────────────────────────────────────────────────────────
        function renderResults(container, results) {
            container.innerHTML = '';
            for (const r of results) {
                const card = document.createElement('div');
                card.className = 'result-card';

                let loc, badge, text;
                if (currentSource === 'manual') {
                    loc   = r.section_number ? `${r.section_number} ${r.section_title}` : r.chapter_title;
                    badge = r.chapter_title;
                    // Quitar el prefijo [Capítulo] [Sección] del texto para display
                    text  = r.text.replace(/^\[[^\]]+\]\s*(\[[^\]]+\]\s*)?/, '');
                } else {
                    loc   = `${r.book} ${r.chapter}:${r.verses.join(',')}`;
                    badge = r.volume;
                    text  = r.text;
                }

                card.innerHTML = `
                    <div class="result-header">
                        <span class="result-loc">${loc}</span>
                        <span class="result-vol">${badge}</span>
                    </div>
                    <div class="result-text">${text}</div>
                `;
                container.appendChild(card);
            }
        }

        function skeletons(n) {
            return Array(n).fill('<div class="skeleton"></div>').join('');
        }

        // ── Listener ──────────────────────────────────────────────────────────
        queryInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') search(queryInput.value);
        });

        init();
    </script>
</body>
</html>
